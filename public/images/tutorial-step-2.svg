<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">填写 API key</title>
  <desc id="desc">在设置窗口填写 API key 的示意图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#edfaff"/>
      <stop offset="1" stop-color="#fff4e8"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1">
      <stop offset="0" stop-color="#63d9bd"/>
      <stop offset="1" stop-color="#5bbdff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#3d3452" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="640" height="400" rx="26" fill="url(#bg)"/>
  <rect x="82" y="50" width="476" height="300" rx="24" fill="#fff" filter="url(#shadow)"/>
  <text x="118" y="103" fill="#272333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="900">设置</text>
  <rect x="118" y="130" width="404" height="60" rx="14" fill="#f6f3fb"/>
  <text x="142" y="166" fill="#756d83" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700">API key</text>
  <rect x="230" y="145" width="244" height="18" rx="9" fill="#d8d2e4"/>
  <circle cx="494" cy="154" r="13" fill="#ff78ad"/>
  <path d="M488 154h12" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <rect x="118" y="214" width="404" height="58" rx="14" fill="#fff8ef" stroke="#ffd9a9"/>
  <path d="M144 244h42l18-22 22 30 14-14 34 34H144z" fill="#ff9a35" opacity=".85"/>
  <rect x="322" y="228" width="134" height="28" rx="14" fill="#f7dfff"/>
  <text x="348" y="249" fill="#8e49d8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="800">key 已填入</text>
  <circle cx="492" cy="242" r="28" fill="url(#ok)"/>
  <path d="M480 242l9 10 18-22" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="104" y="333" fill="#272333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="900">2. 填写 API key 后关闭设置</text>
</svg>
