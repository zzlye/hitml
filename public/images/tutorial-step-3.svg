<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">切换画布工坊</title>
  <desc id="desc">点击左上角画布工坊切换的示意图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8ef"/>
      <stop offset="1" stop-color="#effbff"/>
    </linearGradient>
    <linearGradient id="tab" x1="0" x2="1">
      <stop offset="0" stop-color="#ff78ad"/>
      <stop offset="1" stop-color="#7c6bff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#3d3452" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="640" height="400" rx="26" fill="url(#bg)"/>
  <rect x="58" y="50" width="524" height="300" rx="24" fill="#fff" filter="url(#shadow)"/>
  <rect x="84" y="78" width="168" height="42" rx="21" fill="url(#tab)"/>
  <text x="112" y="106" fill="#fff" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="900">画布工坊</text>
  <path d="M256 100h54" stroke="#ff9a35" stroke-width="8" stroke-linecap="round"/>
  <path d="M306 80l30 20-30 20" fill="none" stroke="#ff9a35" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="92" y="150" width="206" height="142" rx="18" fill="#f4fbff" stroke="#b8e0ff"/>
  <rect x="122" y="180" width="146" height="82" rx="12" fill="#fff"/>
  <path d="M148 234c24-46 52-48 78 0" fill="none" stroke="#63d9bd" stroke-width="10" stroke-linecap="round"/>
  <circle cx="166" cy="204" r="12" fill="#ffcf66"/>
  <rect x="342" y="150" width="206" height="142" rx="18" fill="#f7f3ff" stroke="#d6cbff"/>
  <rect x="370" y="180" width="148" height="16" rx="8" fill="#8f83a6"/>
  <rect x="370" y="214" width="112" height="12" rx="6" fill="#d9d3e2"/>
  <rect x="370" y="240" width="132" height="12" rx="6" fill="#d9d3e2"/>
  <text x="106" y="333" fill="#272333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="900">3. 需要画布时切换画布工坊</text>
</svg>
